groups:
  - name: geo119
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: QueueDepthHigh
        expr: laravel_queue_depth > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue depth > 1000 jobs"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending jobs"

      - alert: APILatencyHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P95 latency > 2s"
          description: "P95 latency for {{ $labels.route }} is {{ $value }}s"

      - alert: DBConnectionPoolExhausted
        expr: pgbouncer_pools_active_connections / pgbouncer_pools_max_connections > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool > 90%"
          description: "PgBouncer pool at {{ $value | humanizePercentage }} capacity"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"

      - alert: RedisHitRateLow
        expr: redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis hit rate < 50%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      - alert: CPUSaturation
        expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU > 90% on {{ $labels.pod }}"
