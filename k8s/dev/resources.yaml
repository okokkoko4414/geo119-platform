apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-laravel
spec:
  template:
    spec:
      containers:
        - name: laravel
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-horizon
spec:
  template:
    spec:
      containers:
        - name: horizon
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
