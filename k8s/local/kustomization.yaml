apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: geo119

resources:
  - ../base

patches:
  - target:
      kind: Deployment
      name: geoflow-laravel
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: geo119:test
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: geoflow-horizon
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: geo119:test
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: geoflow-wordpress
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
