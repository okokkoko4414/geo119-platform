apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-uploads
  namespace: geoflow
  labels:
    app: geoflow
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: geoflow
  labels:
    app: geoflow
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
