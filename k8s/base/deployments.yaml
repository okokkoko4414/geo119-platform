apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-laravel
  namespace: geoflow
  labels:
    app: geoflow
    component: laravel
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: geoflow
      component: laravel
  template:
    metadata:
      labels:
        app: geoflow
        component: laravel
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: geoflow
                    component: laravel
                topologyKey: kubernetes.io/hostname
      containers:
        - name: laravel
          image: ghcr.io/gstack/geoflow:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: geoflow-config
            - secretRef:
                name: geoflow-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-wordpress
  namespace: geoflow
  labels:
    app: geoflow
    component: wordpress
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: geoflow
      component: wordpress
  template:
    metadata:
      labels:
        app: geoflow
        component: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:6-php8.4-fpm-alpine
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: geoflow-config
                  key: DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: geoflow-config
                  key: DB_DATABASE
            - name: WORDPRESS_DB_USER
              value: geoflow
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoflow-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: uploads
              mountPath: /var/www/html/wp-content/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: wordpress-uploads
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-horizon
  namespace: geoflow
  labels:
    app: geoflow
    component: horizon
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: geoflow
      component: horizon
  template:
    metadata:
      labels:
        app: geoflow
        component: horizon
    spec:
      containers:
        - name: horizon
          image: ghcr.io/gstack/geoflow:latest
          command: ["php", "artisan", "horizon"]
          envFrom:
            - configMapRef:
                name: geoflow-config
            - secretRef:
                name: geoflow-secrets
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1024Mi
          livenessProbe:
            exec:
              command:
                - php
                - artisan
                - horizon:status
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: geoflow
                    component: horizon
                topologyKey: kubernetes.io/hostname
