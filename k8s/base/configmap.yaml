apiVersion: v1
kind: ConfigMap
metadata:
  name: geoflow-config
  namespace: geoflow
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_TIMEZONE: "UTC"
  APP_LOCALE: "en"
  APP_FALLBACK_LOCALE: "en"

  DB_CONNECTION: "pgsql"
  DB_HOST: "pgbouncer.geoflow.svc.cluster.local"
  DB_PORT: "6432"
  DB_DATABASE: "geoflow"

  REDIS_HOST: "redis.geoflow.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_CLIENT: "predis"

  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"

  DEEPSEEK_ENDPOINT: "http://claude-local.geoflow.svc.cluster.local:8000"

  LARAVEL_TELESCOPE_ENABLED: "false"

  LOG_CHANNEL: "stdout"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  CORS_ALLOWED_ORIGINS: "https://geo119.com"
