apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-laravel
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-horizon
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-wordpress
spec:
  replicas: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geoflow-laravel-hpa
spec:
  minReplicas: 2
  maxReplicas: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geoflow-horizon-hpa
spec:
  minReplicas: 1
  maxReplicas: 4
