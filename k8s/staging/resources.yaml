apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-laravel
spec:
  template:
    spec:
      containers:
        - name: laravel
          resources:
            requests:
              cpu: 200m
              memory: 192Mi
            limits:
              cpu: 750m
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoflow-horizon
spec:
  template:
    spec:
      containers:
        - name: horizon
          resources:
            requests:
              cpu: 250m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 768Mi
