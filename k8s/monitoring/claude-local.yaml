---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-local-nginx-conf
  namespace: geo119
data:
  default.conf: |
    server {
        listen       8000;
        server_name  localhost;

        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"claude-local","version":"1.0.0"}';
        }

        location / {
            default_type application/json;
            return 404 '{"error":"not found"}';
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-local
  namespace: geo119
  labels:
    app: claude-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-local
  template:
    metadata:
      labels:
        app: claude-local
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: claude-local-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: claude-local
  namespace: geo119
  labels:
    app: claude-local
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: claude-local
